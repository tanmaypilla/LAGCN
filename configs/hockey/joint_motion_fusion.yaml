work_dir: ./work_dir/hockey/joint_motion_fusion_w30

feeder: feeders.feeder_hockey.Feeder
train_feeder_args:
  data_path: /home/tanmay-ura/LAGCN/data/annotations/train.pkl
  split: train
  window_size: 30
  p_interval: [0.75, 1]
  random_rot: False
  bone: False
  vel: False
  dual_stream: True
  debug: False

test_feeder_args:
  data_path: /home/tanmay-ura/LAGCN/data/annotations/test.pkl
  split: test
  window_size: 30
  p_interval: [0.95]
  bone: False
  vel: False
  dual_stream: True
  debug: False

model: model.lagcn_fusion.FusionModel
model_args:
  num_class: 11
  num_point: 20
  num_person: 1
  in_channels: 2
  graph: graph.hockey.Graph
  graph_args:
    labeling_mode: 'spatial'
  examplar: graph.cls_examplar.CLSExamplar
  examplar_args:
    topo_str: "when_[C]_[J]_of_hockey_player-with-punctuation"
    base_dir: cls_matrix_hockey
  fusion_mode: gate
  temporal_cpr: False
  motion_in_channels: 4

weight_decay: 0.0004
base_lr: 0.1
lr_decay_rate: 0.1
step: [35, 55]

device: 0
batch_size: 32
test_batch_size: 32
num_epoch: 65
nesterov: True
warm_up_epoch: 5
aux_weight: 0.2
force_rerun: True

class_names:
  - "GLID_FORW"
  - "ACCEL_FORW"
  - "GLID_BACK"
  - "ACCEL_BACK"
  - "TRANS_FORW_TO_BACK"
  - "TRANS_BACK_TO_FORW"
  - "POST_WHISTLE_GLIDING"
  - "FACEOFF_BODY_POSITION"
  - "MAINTAIN_POSITION"
  - "PRONE"
  - "ON_A_KNEE"
